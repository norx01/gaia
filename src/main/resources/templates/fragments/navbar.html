<!-- fragments/navbar.html -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- NAVBAR SUPERIOR -->
<header th:fragment="navbar"
        class="h-14 bg-[#343b42] border-b border-gray-700 flex items-center justify-between px-5 shadow">

    <div class="flex items-center gap-8">
        <button class="text-gray-300 text-xl">☰</button>

        <a th:href="@{/}"
           class="text-sm text-gray-200 hover:text-white">
            Home
        </a>

        <a th:href="@{/contact}"
           class="text-sm text-gray-200 hover:text-white">
            Contact
        </a>
    </div>

    <div class="flex items-center gap-5 text-sm">
        <span>🔔</span>

        <a th:href="@{/logout}"
           class="font-semibold hover:text-white">
            Cerrar sesión
        </a>

        <span>⛶</span>
    </div>
</header>

</body>
</html>
