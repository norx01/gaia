<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="min-h-screen bg-[#46525a] text-gray-100">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-1 flex flex-col">

        <!-- NAVBAR -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <!-- AREA PRINCIPAL -->
        <!-- AREA PRINCIPAL -->
        <section class="flex-1 p-4 md:p-6">

            <!-- CONTENEDOR MÁS GRANDE -->
            <div class="w-full max-w-6xl mx-auto bg-[#343a40] border border-gray-600 rounded shadow-2xl">

                <!-- HEADER -->
                <div class="flex items-center justify-between px-6 py-5 border-b border-gray-600">
                    <h1 class="text-3xl font-semibold text-white"
                        th:text="${usuarios.id == null} ? 'Agregar usuario' : 'Editar usuario'">
                        Agregar usuario
                    </h1>

                    <a th:href="@{/view/usuarios}"
                       class="text-gray-400 hover:text-white text-3xl font-bold">
                        ×
                    </a>
                </div>

                <!-- FORMULARIO -->
                <form th:action="@{/view/usuarios/save}"
                      th:object="${usuarios}"
                      method="post"
                      novalidate>

                    <input type="hidden" th:field="*{id}" />

                    <!-- GRID MÁS GRANDE -->
                    <div class="px-6 py-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">

                        <!-- TIPO -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Tipo de Documento
                            </label>

                            <select th:field="*{tipo_documento}"
                                    class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Tipo...</option>
                                <option value="CC">CC</option>
                                <option value="TI">TI</option>
                                <option value="CE">CE</option>
                                <option value="ID">ID</option>
                            </select>
                        </div>

                        <!-- DOCUMENTO -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Documento
                            </label>

                            <input type="text"
                                   th:field="*{documento_id}"
                                   placeholder="Numero identificación"
                                   class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- NOMBRE -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Nombre
                            </label>

                            <input type="text"
                                   th:field="*{nombre}"
                                   placeholder="Nombre"
                                   class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- APELLIDO -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Apellidos
                            </label>

                            <input type="text"
                                   th:field="*{apellido}"
                                   placeholder="Apellidos"
                                   class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- FECHA -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Fecha nacimiento
                            </label>

                            <input type="date"
                                   th:field="*{fecha_nacimiento}"
                                   class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- CORREO -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Correo
                            </label>

                            <input type="email"
                                   th:field="*{correo}"
                                   placeholder="Correo"
                                   class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- ROL -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Rol
                            </label>

                            <select th:field="*{rol}"
                                    class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Seleccionar rol...</option>
                                <option value="Administrador">Administrador</option>
                                <option value="Bienestar">Bienestar</option>
                                <option value="Financiera">Financiera</option>
                                <option value="Aprendiz">Aprendiz</option>
                            </select>
                        </div>

                        <!-- FICHA -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Ficha
                            </label>

                            <input type="text"
                                   th:field="*{ficha}"
                                   placeholder="Ficha"
                                   class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- ESTADO -->
                        <div>
                            <label class="block mb-2 text-sm font-semibold text-gray-200">
                                Estado
                            </label>

                            <select th:field="*{estado}"
                                    class="w-full bg-[#343a40] border border-gray-500 rounded px-4 py-3 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Seleccionar estado...</option>
                                <option value="activo">activo</option>
                                <option value="inactivo">inactivo</option>
                            </select>
                        </div>

                    </div>

                    <!-- FOOTER -->
                    <div class="flex justify-end gap-3 px-6 py-5 border-t border-gray-600">

                        <a th:href="@{/view/usuarios}"
                           class="border border-gray-500 hover:bg-gray-600 text-white px-5 py-2 rounded">
                            Cancelar
                        </a>

                        <button type="submit"
                                class="bg-[#3f6fa3] hover:bg-[#4d7fb5] text-white px-6 py-2 rounded font-semibold">
                            Guardar
                        </button>

                    </div>

                </form>

            </div>

        </section>
        <!-- FOOTER -->
        <footer class="h-14 bg-[#343b42] border-t border-gray-700 flex items-center justify-between px-5 text-xs text-gray-400">
            <p>
                Copyright © 2026
                <span class="text-blue-400 font-bold">ADSO 3063989</span>.
                All rights reserved.
            </p>

            <p>Version 0.0.0</p>
        </footer>

    </main>

</div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
